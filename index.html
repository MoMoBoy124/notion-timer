<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Timer</title>
<style>
body {
  margin: 0;
  background: #191919;
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #e6e6e6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 300px;
}

.container {
  text-align: center;
}

svg {
  width: 160px;
  height: 160px;
}

.timer {
  font-size: 42px;
  font-weight: 600;
  margin-top: -120px;
}

button {
  margin-top: 18px;
  padding: 8px 18px;
  background: #2a2a2a;
  color: #e6e6e6;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #333;
}
</style>
</head>
<body>
<div class="container">
<svg>
  <circle stroke="#2a2a2a" fill="transparent" stroke-width="6"
    r="70" cx="80" cy="80"/>
  <circle id="progress" stroke="#4caf50" fill="transparent"
    stroke-width="6" r="70" cx="80" cy="80"
    stroke-dasharray="439"
    transform="rotate(-90 80 80)"/>
</svg>

<div class="timer" id="display">120:00</div>
<button onclick="toggleTimer()" id="toggle">Start</button>
</div>

<script>
const TOTAL = 7200;
let remaining = TOTAL;
let interval = null;
const circumference = 2 * Math.PI * 70;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const toggleBtn = document.getElementById("toggle");

progress.style.strokeDasharray = circumference;

function update() {
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  display.textContent =
    String(m).padStart(2,"0") + ":" +
    String(s).padStart(2,"0");

  progress.style.strokeDashoffset =
    circumference * (1 - remaining / TOTAL);

  localStorage.setItem("remaining", remaining);
}

function toggleTimer() {
  if (interval) {
    clearInterval(interval);
    interval = null;
    toggleBtn.textContent = "Resume";
  } else {
    interval = setInterval(() => {
      if (remaining > 0) {
        remaining--;
        update();
      } else {
        clearInterval(interval);
      }
    },1000);
    toggleBtn.textContent = "Pause";
  }
}

remaining = parseInt(localStorage.getItem("remaining") || TOTAL);
update();
</script>
</body>
</html>
