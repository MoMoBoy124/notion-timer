<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Timer</title>

<style>
body {
  margin: 0;
  background: #191919;
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #e6e6e6;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0;
}

.container {
  text-align: center;
}

svg {
  width: 200px;
  height: 200px;
  display: block;
  margin: auto;
}

.timer {
  font-size: 48px;
  font-weight: 600;
  margin-top: -140px;
}

.buttons {
  margin-top: 30px;
}

button {
  background: #2a2a2a;
  color: #e6e6e6;
  border: 1px solid #333;
  padding: 10px 20px;
  margin: 0 6px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #333;
}

.streak {
  margin-top: 25px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<svg>
  <circle stroke="#2a2a2a"
          fill="transparent"
          stroke-width="10"
          r="85"
          cx="100"
          cy="100"/>

  <circle id="progress"
          stroke="#4caf50"
          fill="transparent"
          stroke-width="10"
          r="85"
          cx="100"
          cy="100"
          stroke-dasharray="534"
          transform="rotate(-90 100 100)"/>
</svg>

<div class="timer" id="display">120:00</div>

<div class="buttons">
  <button onclick="toggleTimer()" id="toggleBtn">Start</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<div class="streak">
  🔥 Streak: <span id="streak">0</span> days
</div>

</div>

<script>
const TOTAL_SECONDS = 7200;
let remaining = TOTAL_SECONDS;
let interval = null;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const toggleBtn = document.getElementById("toggleBtn");
const streakDisplay = document.getElementById("streak");

const radius = 85;
const circumference = 2 * Math.PI * radius;
progress.style.strokeDasharray = circumference;

function updateDisplay() {
  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;

  display.textContent =
    String(minutes).padStart(2, "0") +
    ":" +
    String(seconds).padStart(2, "0");

  progress.style.strokeDashoffset =
    circumference * (1 - remaining / TOTAL_SECONDS);

  localStorage.setItem("remaining", remaining);
}

function toggleTimer() {
  if (interval) {
    clearInterval(interval);
    interval = null;
    toggleBtn.textContent = "Resume";
  } else {
    interval = setInterval(() => {
      if (remaining > 0) {
        remaining--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        toggleBtn.textContent = "Start";
        completeDay();
      }
    }, 1000);
    toggleBtn.textContent = "Pause";
  }
}

function resetTimer() {
  clearInterval(interval);
  interval = null;
  remaining = TOTAL_SECONDS;
  toggleBtn.textContent = "Start";
  updateDisplay();
}

function completeDay() {
  const today = new Date().toDateString();
  const lastCompleted = localStorage.getItem("lastCompleted");

  if (lastCompleted !== today) {
    let streak = parseInt(localStorage.getItem("streak") || "0");
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastCompleted", today);
  }

  loadStreak();
}

function loadStreak() {
  streakDisplay.textContent = localStorage.getItem("streak") || "0";
}

function checkMidnightReset() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");

  if (lastVisit && lastVisit !== today) {
    remaining = TOTAL_SECONDS;
    localStorage.setItem("remaining", TOTAL_SECONDS);
  }

  localStorage.setItem("lastVisit", today);
}

function init() {
  checkMidnightReset();
  remaining = parseInt(localStorage.getItem("remaining") || TOTAL_SECONDS);
  updateDisplay();
  loadStreak();
}

init();
</script>

</body>
</html>
