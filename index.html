<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Timer</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #191919;
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #e6e6e6;
}

.container {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 25px 40px;
  gap: 60px;
}

.ring-wrapper {
  position: relative;
  width: 230px;
  height: 230px;
}

svg {
  width: 230px;
  height: 230px;
}

.timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 52px;
  font-weight: 600;
}

.controls {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}

.buttons {
  display: flex;
  gap: 14px;
}

button {
  background: #2a2a2a;
  color: #e6e6e6;
  border: 1px solid #333;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #333;
}

.streak {
  font-size: 16px;
  opacity: 0.75;
}
</style>
</head>

<body>

<div class="container">

  <div class="ring-wrapper">
    <svg>
      <circle
        stroke="#2a2a2a"
        fill="transparent"
        stroke-width="12"
        r="100"
        cx="115"
        cy="115"/>

      <circle
        id="progress"
        stroke="#4caf50"
        fill="transparent"
        stroke-width="12"
        r="100"
        cx="115"
        cy="115"
        stroke-dasharray="628"
        transform="rotate(-90 115 115)"/>
    </svg>

    <div class="timer" id="display">120:00</div>
  </div>

  <div class="controls">
    <div class="buttons">
      <button onclick="toggleTimer()" id="toggleBtn">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>

    <div class="streak">
      🔥 Streak: <span id="streak">0</span> days
    </div>
  </div>

</div>

<script>
const TOTAL_SECONDS = 7200;

let endTimestamp = null;
let interval = null;
let isRunning = false;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const toggleBtn = document.getElementById("toggleBtn");
const streakDisplay = document.getElementById("streak");

const radius = 100;
const circumference = 2 * Math.PI * radius;
progress.style.strokeDasharray = circumference;

/* =========================
   SYDNEY DATE (CRITICAL)
========================= */

function getSydneyDate() {
  return new Intl.DateTimeFormat("en-AU", {
    timeZone: "Australia/Sydney",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).format(new Date());
}

/* =========================
   TIMER LOGIC
========================= */

function getRemainingSeconds() {
  if (!endTimestamp) {
    return parseInt(localStorage.getItem("remaining") || TOTAL_SECONDS);
  }
  return Math.max(0, Math.floor((endTimestamp - Date.now()) / 1000));
}

function updateDisplay() {
  const remaining = getRemainingSeconds();

  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;

  display.textContent =
    String(minutes).padStart(2, "0") +
    ":" +
    String(seconds).padStart(2, "0");

  progress.style.strokeDashoffset =
    circumference * (1 - remaining / TOTAL_SECONDS);

  localStorage.setItem("remaining", remaining);

  if (remaining === 0 && isRunning) {
    clearInterval(interval);
    interval = null;
    isRunning = false;
    toggleBtn.textContent = "Start";
    completeDay();
  }
}

/* =========================
   TIMER CONTROLS
========================= */

function toggleTimer() {

  if (isRunning) {
    const remaining = getRemainingSeconds();
    localStorage.setItem("remaining", remaining);

    endTimestamp = null;
    clearInterval(interval);
    interval = null;

    isRunning = false;
    toggleBtn.textContent = "Resume";
  }

  else {
    const remaining = getRemainingSeconds();
    endTimestamp = Date.now() + remaining * 1000;

    interval = setInterval(updateDisplay, 1000);

    isRunning = true;
    toggleBtn.textContent = "Pause";
  }

}

function resetTimer() {
  clearInterval(interval);
  interval = null;
  isRunning = false;
  endTimestamp = null;

  localStorage.setItem("remaining", TOTAL_SECONDS);
  toggleBtn.textContent = "Start";

  updateDisplay();
}

/* =========================
   STREAK LOGIC
========================= */

function daysBetween(date1, date2) {
  const d1 = new Date(date1);
  const d2 = new Date(date2);

  const diff = Math.abs(d2 - d1);
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function completeDay() {

  const today = getSydneyDate();
  const lastCompleted = localStorage.getItem("lastCompleted");

  let streak = parseInt(localStorage.getItem("streak") || "0");

  if (!lastCompleted) {
    streak = 1;
  }

  else {

    const diff = daysBetween(lastCompleted, today);

    if (diff === 0) {
      return;
    }

    if (diff === 1) {
      streak += 1;
    }

    if (diff > 1) {
      streak = 1;
    }

  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastCompleted", today);

  loadStreak();
}

function loadStreak() {
  streakDisplay.textContent = localStorage.getItem("streak") || "0";
}

/* =========================
   DAILY RESET
========================= */

function checkNewDay() {

  const today = getSydneyDate();
  const lastSeen = localStorage.getItem("lastSeenDate");

  if (lastSeen && lastSeen !== today) {

    localStorage.setItem("remaining", TOTAL_SECONDS);

    clearInterval(interval);
    interval = null;
    isRunning = false;
    endTimestamp = null;

    toggleBtn.textContent = "Start";

  }

  localStorage.setItem("lastSeenDate", today);
}

/* =========================
   INIT
========================= */

function init() {

  checkNewDay();

  updateDisplay();
  loadStreak();

  setInterval(checkNewDay, 60000); // check every minute
}

init();
</script>

</body>
</html>
