<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Study Timer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 80px;
    }

    .timer {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .progress-ring {
      width: 220px;
      height: 220px;
      margin: auto;
    }

    button {
      background: white;
      color: black;
      border: none;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .streak {
      margin-top: 30px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="progress-ring">
    <svg width="220" height="220">
      <circle
        stroke="#333"
        fill="transparent"
        stroke-width="10"
        r="100"
        cx="110"
        cy="110"
      />
      <circle
        id="progress"
        stroke="#4caf50"
        fill="transparent"
        stroke-width="10"
        r="100"
        cx="110"
        cy="110"
        stroke-dasharray="628"
        stroke-dashoffset="0"
        transform="rotate(-90 110 110)"
      />
    </svg>
  </div>

  <div class="timer" id="display">120:00</div>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>

  <div class="streak">
    🔥 Streak: <span id="streak">0</span> days
  </div>

<script>
const TOTAL_SECONDS = 7200; // 2 hours
let remaining = TOTAL_SECONDS;
let interval = null;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const streakDisplay = document.getElementById("streak");

const circumference = 2 * Math.PI * 100;
progress.style.strokeDasharray = circumference;

function updateDisplay() {
  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;
  display.textContent =
    String(minutes).padStart(2, "0") +
    ":" +
    String(seconds).padStart(2, "0");

  const percent = remaining / TOTAL_SECONDS;
  progress.style.strokeDashoffset = circumference * (1 - percent);

  localStorage.setItem("remaining", remaining);
}

function startTimer() {
  if (interval) return;
  interval = setInterval(() => {
    if (remaining > 0) {
      remaining--;
      updateDisplay();
    } else {
      clearInterval(interval);
      interval = null;
      completeDay();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(interval);
  interval = null;
}

function resetTimer() {
  pauseTimer();
  remaining = TOTAL_SECONDS;
  updateDisplay();
}

function completeDay() {
  const today = new Date().toDateString();
  const lastCompleted = localStorage.getItem("lastCompleted");

  if (lastCompleted !== today) {
    let streak = parseInt(localStorage.getItem("streak") || "0");
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastCompleted", today);
  }
  loadStreak();
}

function loadStreak() {
  streakDisplay.textContent = localStorage.getItem("streak") || "0";
}

function checkMidnightReset() {
  const lastVisit = localStorage.getItem("lastVisitDate");
  const today = new Date().toDateString();
  if (lastVisit && lastVisit !== today) {
    remaining = TOTAL_SECONDS;
    localStorage.setItem("remaining", TOTAL_SECONDS);
  }
  localStorage.setItem("lastVisitDate", today);
}

function init() {
  checkMidnightReset();
  remaining = parseInt(localStorage.getItem("remaining") || TOTAL_SECONDS);
  updateDisplay();
  loadStreak();
}

init();
</script>

</body>
</html>
