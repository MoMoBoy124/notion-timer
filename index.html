<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Timer</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #191919;
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #e6e6e6;
}

.container {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 25px 40px;
  gap: 60px;
}

.ring-wrapper {
  position: relative;
  width: 230px;
  height: 230px;
}

svg {
  width: 230px;
  height: 230px;
}

.timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 52px;
  font-weight: 600;
}

.controls {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}

.buttons {
  display: flex;
  gap: 14px;
}

button {
  background: #2a2a2a;
  color: #e6e6e6;
  border: 1px solid #333;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #333;
}

.streak {
  font-size: 16px;
  opacity: 0.75;
}
</style>
</head>

<body>

<div class="container">

  <div class="ring-wrapper">
    <svg>
      <circle
        stroke="#2a2a2a"
        fill="transparent"
        stroke-width="12"
        r="100"
        cx="115"
        cy="115"/>

      <circle
        id="progress"
        stroke="#4caf50"
        fill="transparent"
        stroke-width="12"
        r="100"
        cx="115"
        cy="115"
        stroke-dasharray="628"
        transform="rotate(-90 115 115)"/>
    </svg>

    <div class="timer" id="display">120:00</div>
  </div>

  <div class="controls">
    <div class="buttons">
      <button onclick="toggleTimer()" id="toggleBtn">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>

    <div class="streak">
      🔥 Streak: <span id="streak">0</span> days
    </div>
  </div>

</div>

<script>
const TOTAL_SECONDS = 7200;

let endTimestamp = null;
let interval = null;
let isRunning = false;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const toggleBtn = document.getElementById("toggleBtn");
const streakDisplay = document.getElementById("streak");

const radius = 100;
const circumference = 2 * Math.PI * radius;
progress.style.strokeDasharray = circumference;

/* =========================
   TIME CALCULATION (FIXED)
========================= */

function getRemainingSeconds() {
  if (!endTimestamp) {
    return parseInt(localStorage.getItem("remaining") || TOTAL_SECONDS);
  }
  return Math.max(0, Math.floor((endTimestamp - Date.now()) / 1000));
}

function updateDisplay() {
  const remaining = getRemainingSeconds();

  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;

  display.textContent =
    String(minutes).padStart(2, "0") +
    ":" +
    String(seconds).padStart(2, "0");

  progress.style.strokeDashoffset =
    circumference * (1 - remaining / TOTAL_SECONDS);

  localStorage.setItem("remaining", remaining);

  if (remaining === 0 && isRunning) {
    clearInterval(interval);
    interval = null;
    isRunning = false;
    toggleBtn.textContent = "Start";
    completeDay();
  }
}

/* =========================
   TIMER CONTROLS
========================= */

function toggleTimer() {
  if (isRunning) {
    // Pause
    const remaining = getRemainingSeconds();
    localStorage.setItem("remaining", remaining);
    endTimestamp = null;
    clearInterval(interval);
    interval = null;
    isRunning = false;
    toggleBtn.textContent = "Resume";
  } else {
    // Start / Resume
    const remaining = getRemainingSeconds();
    endTimestamp = Date.now() + remaining * 1000;

    interval = setInterval(updateDisplay, 1000);
    isRunning = true;
    toggleBtn.textContent = "Pause";
  }
}

function resetTimer() {
  clearInterval(interval);
  interval = null;
  isRunning = false;
  endTimestamp = null;
  localStorage.setItem("remaining", TOTAL_SECONDS);
  toggleBtn.textContent = "Start";
  updateDisplay();
}

/* =========================
   STREAK LOGIC
========================= */

function completeDay() {
  const today = new Date().toDateString();
  const lastCompleted = localStorage.getItem("lastCompleted");

  if (lastCompleted !== today) {
    let streak = parseInt(localStorage.getItem("streak") || "0");
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastCompleted", today);
  }

  loadStreak();
}

function loadStreak() {
  streakDisplay.textContent = localStorage.getItem("streak") || "0";
}

/* =========================
   MIDNIGHT RESET
========================= */

function checkMidnightReset() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");

  if (lastVisit && lastVisit !== today) {
    localStorage.setItem("remaining", TOTAL_SECONDS);
    localStorage.removeItem("lastCompleted");
  }

  localStorage.setItem("lastVisit", today);
}

/* =========================
   INIT
========================= */

function init() {
  checkMidnightReset();
  updateDisplay();
  loadStreak();
}

init();
</script>

</body>
</html>
