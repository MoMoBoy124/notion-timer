<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Timer</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #191919;
  font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #e6e6e6;
}

.container {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 25px 40px;
  gap: 60px;
}

/* TIMER */

.ring-wrapper {
  position: relative;
  width: 230px;
  height: 230px;
}

svg {
  width: 230px;
  height: 230px;
}

.timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 52px;
  font-weight: 600;
}

/* CONTROLS */

.controls {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}

.buttons {
  display: flex;
  gap: 14px;
}

button {
  background: #2a2a2a;
  color: #e6e6e6;
  border: 1px solid #333;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #333;
}

.streak {
  font-size: 16px;
  opacity: 0.75;
}

/* HEATMAP */

.heatmap {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(7, 14px);
  gap: 5px;
}

.day {
  width: 14px;
  height: 14px;
  background: #2a2a2a;
  border-radius: 3px;
}

.level1 { background:#2e7d32 }
.level2 { background:#43a047 }
.level3 { background:#66bb6a }
.level4 { background:#81c784 }

</style>
</head>

<body>

<div class="container">

  <div class="ring-wrapper">
    <svg>
      <circle
        stroke="#2a2a2a"
        fill="transparent"
        stroke-width="12"
        r="100"
        cx="115"
        cy="115"/>

      <circle
        id="progress"
        stroke="#4caf50"
        fill="transparent"
        stroke-width="12"
        r="100"
        cx="115"
        cy="115"
        stroke-dasharray="628"
        transform="rotate(-90 115 115)"/>
    </svg>

    <div class="timer" id="display">120:00</div>
  </div>

  <div class="controls">

    <div class="buttons">
      <button onclick="toggleTimer()" id="toggleBtn">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>

    <div class="streak">
      🔥 Streak: <span id="streak">0</span> days
    </div>

    <div id="heatmap" class="heatmap"></div>

  </div>

</div>

<script>

let currentDay = new Date().toDateString();

const TOTAL_SECONDS = 7200;

let endTimestamp = localStorage.getItem("endTimestamp")
  ? parseInt(localStorage.getItem("endTimestamp"))
  : null;

let interval = null;

const display = document.getElementById("display");
const progress = document.getElementById("progress");
const toggleBtn = document.getElementById("toggleBtn");
const streakDisplay = document.getElementById("streak");
const heatmap = document.getElementById("heatmap");

const radius = 100;
const circumference = 2 * Math.PI * radius;
progress.style.strokeDasharray = circumference;

/* SOUND */

function playSound() {

  const audio = new Audio(
    "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
  );

  audio.volume = 0.6;
  audio.play();
}

/* TIMER */

function getRemainingSeconds() {

  if (!endTimestamp)
    return parseInt(localStorage.getItem("remaining") || TOTAL_SECONDS);

  return Math.max(
    0,
    Math.floor((endTimestamp - Date.now()) / 1000)
  );
}

function updateDisplay() {

  const remaining = getRemainingSeconds();

  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;

  display.textContent =
    String(minutes).padStart(2,"0") +
    ":" +
    String(seconds).padStart(2,"0");

  progress.style.strokeDashoffset =
    circumference * (1 - remaining / TOTAL_SECONDS);

  localStorage.setItem("remaining", remaining);

  if (remaining === 0 && endTimestamp) {

    clearInterval(interval);

    endTimestamp = null;

    localStorage.removeItem("endTimestamp");

    toggleBtn.textContent = "Start";

    completeDay();

    playSound();
  }
}

/* CONTROLS */

function toggleTimer() {

  if (endTimestamp) {

    const remaining = getRemainingSeconds();

    localStorage.setItem("remaining", remaining);

    localStorage.removeItem("endTimestamp");

    endTimestamp = null;

    clearInterval(interval);

    toggleBtn.textContent = "Resume";

  } else {

    const remaining = getRemainingSeconds();

    endTimestamp = Date.now() + remaining * 1000;

    localStorage.setItem("endTimestamp", endTimestamp);

    interval = setInterval(updateDisplay, 1000);

    toggleBtn.textContent = "Pause";
  }
}

function resetTimer() {

  clearInterval(interval);

  endTimestamp = null;

  localStorage.removeItem("endTimestamp");

  localStorage.setItem("remaining", TOTAL_SECONDS);

  toggleBtn.textContent = "Start";

  updateDisplay();
}

/* STREAK */

function completeDay() {

  const today = new Date();
  const todayStr = today.toDateString();

  const lastCompleted = localStorage.getItem("lastCompleted");

  let streak = parseInt(localStorage.getItem("streak") || "0");

  if (!lastCompleted) {

    streak = 1;

  } else {

    const lastDate = new Date(lastCompleted);

    const diff =
      Math.floor((today-lastDate)/(1000*60*60*24));

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastCompleted", todayStr);

  recordHeatmap();

  loadStreak();
}

function loadStreak() {

  streakDisplay.textContent =
    localStorage.getItem("streak") || "0";
}

/* HEATMAP */

function recordHeatmap(){

  const today = new Date().toISOString().slice(0,10);

  let data =
    JSON.parse(localStorage.getItem("heatmap")||"{}");

  data[today] = (data[today]||0) + 1;

  localStorage.setItem("heatmap",JSON.stringify(data));

  renderHeatmap();
}

function renderHeatmap(){

  heatmap.innerHTML="";

  const data =
    JSON.parse(localStorage.getItem("heatmap")||"{}");

  for(let i=29;i>=0;i--){

    const d=new Date();

    d.setDate(d.getDate()-i);

    const key=d.toISOString().slice(0,10);

    const value=data[key]||0;

    const cell=document.createElement("div");

    cell.classList.add("day");

    if(value>=4)cell.classList.add("level4");
    else if(value>=3)cell.classList.add("level3");
    else if(value>=2)cell.classList.add("level2");
    else if(value>=1)cell.classList.add("level1");

    heatmap.appendChild(cell);
  }
}

function checkDayChange(){

  const today = new Date().toDateString();

  if(today !== currentDay){

    currentDay = today;

    /* reset timer for new day */
    localStorage.setItem("remaining", TOTAL_SECONDS);
    localStorage.removeItem("lastCompleted");

    resetTimer();

    /* regenerate heatmap so today moves */
    generateHeatmap();
  }

}

/* RESET */

function checkMidnightReset(){

  const today=new Date().toDateString();

  const lastVisit=localStorage.getItem("lastVisit");

  if(lastVisit && lastVisit!==today){

    localStorage.setItem("remaining",TOTAL_SECONDS);

    localStorage.removeItem("endTimestamp");
  }

  localStorage.setItem("lastVisit",today);
}

/* INIT */

function init(){

  checkMidnightReset();

  if(endTimestamp){

    interval=setInterval(updateDisplay,1000);

    toggleBtn.textContent="Pause";
  }

  updateDisplay();

  loadStreak();

  renderHeatmap();
}

init();

setInterval(checkDayChange, 60000); // check every minute

</script>

</body>
</html>
